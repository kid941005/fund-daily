# Fund Daily - 标准部署配置
# 使用预构建镜像，无需本地构建
#
# 使用方式:
#   curl -O https://raw.githubusercontent.com/kid941005/fund-daily/main/docker-compose.yml
#   docker-compose up -d

services:
  # ============== 数据库 ==============
  postgres:
    image: postgres:15-alpine
    container_name: fund-daily-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-fund_daily}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============== 缓存 ==============
  redis:
    image: redis:7-alpine
    container_name: fund-daily-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-}
    env_file:
      - .env
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============== 后端 API + 前端 ==============
  backend:
    image: kid941005/fund-daily:latest
    container_name: fund-daily-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 数据库配置
      - FUND_DAILY_DB_HOST=postgres
      - FUND_DAILY_DB_PORT=5432
      - FUND_DAILY_DB_NAME=${POSTGRES_DB:-fund_daily}
      - FUND_DAILY_DB_USER=${POSTGRES_USER:-kid}
      - FUND_DAILY_DB_PASSWORD=${POSTGRES_PASSWORD:-}
      # Redis 配置
      - FUND_DAILY_REDIS_HOST=redis
      - FUND_DAILY_REDIS_PORT=6379
      - FUND_DAILY_REDIS_DB=${REDIS_DB:-0}
      - FUND_DAILY_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - FUND_DAILY_REDIS_TTL=${REDIS_TTL:-1800}
      # 服务器配置
      - FUND_DAILY_SERVER_HOST=0.0.0.0
      - FUND_DAILY_SERVER_PORT=5000
      - FUND_DAILY_ENV=production
      # 安全配置（生产环境必须设置）
      - FUND_DAILY_JWT_SECRET=${FUND_DAILY_JWT_SECRET:-}
      - FUND_DAILY_SECRET_KEY=${FUND_DAILY_SECRET_KEY:-}
    volumes:
      # 前端构建产物
      - ./dist:/app/dist:ro
    ports:
      - "${FUND_DAILY_SERVER_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

# ============== 数据卷 ==============
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============== 网络 ==============
networks:
  default:
    name: fund-daily-network
    driver: bridge
