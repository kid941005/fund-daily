version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: fund-daily-postgres
    environment:
      POSTGRES_USER: kid
      POSTGRES_PASSWORD: 941005
      POSTGRES_DB: fund_daily
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kid"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: fund-daily-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask 应用
  app:
    build: .
    container_name: fund-daily-app
    ports:
      - "5000:5000"
    environment:
      - FUND_DAILY_DB_TYPE=postgres
      - FUND_DAILY_DB_HOST=postgres
      - FUND_DAILY_DB_USER=kid
      - FUND_DAILY_DB_PASSWORD=941005
      - FUND_DAILY_DB_NAME=fund_daily
      - REDIS_HOST=redis
      - FUND_DAILY_CACHE_DURATION=600
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
