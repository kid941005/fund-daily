version: '3.8'

services:
  fund-daily-web:
    image: kid941005/fund-daily:1.5.2
    container_name: fund-daily-web
    ports:
      - "5000:5000"
    environment:
      - TZ=Asia/Shanghai
      - FLASK_ENV=production
      - FUND_DAILY_SECRET_KEY=db9bde58bbf336f7c33ada3870a3811b16d3c5222bcb20c2e949cada81864b33
      - FUND_DAILY_SSL_VERIFY=1
      - FUND_DAILY_DB_PATH=/app/data/fund-daily.db
      - FUND_CODES=000001,110022,161725
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
