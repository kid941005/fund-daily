version: '3.8'

# Fund Daily v2.6.0 Docker Compose 配置
# 项目特性:
# - 仅支持 PostgreSQL (SQLite 已完全移除)
# - JWT 认证系统
# - 多级缓存管理器 (Redis + 内存)
# - 统一错误处理中间件
# - 响应式 Vue 3 前端
# - 线程安全速率限制器
# - 健康检查和监控端点

services:
  # PostgreSQL 数据库 (v15 Alpine)
  postgres:
    image: postgres:15-alpine
    container_name: fund-daily-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-941005}
      POSTGRES_DB: ${POSTGRES_DB:-fund_daily}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kid}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - fund-daily-network

  # Redis 缓存 (v7 Alpine)
  redis:
    image: redis:7-alpine
    container_name: fund-daily-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    env_file:
      - .env
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fund-daily-network

  # Node.js 前端构建服务
  frontend-builder:
    build:
      context: ./web/vue3
      dockerfile: Dockerfile.frontend
    container_name: fund-daily-frontend-builder
    volumes:
      - ./dist:/app/dist
    environment:
      - NODE_ENV=production
    command: npm run build
    networks:
      - fund-daily-network

  # Flask 后端应用 (多阶段构建)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: fund-daily-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      frontend-builder:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # 数据库配置
      - FUND_DAILY_DB_HOST=postgres
      - FUND_DAILY_DB_PORT=5432
      - FUND_DAILY_DB_NAME=${POSTGRES_DB:-fund_daily}
      - FUND_DAILY_DB_USER=${POSTGRES_USER:-kid}
      - FUND_DAILY_DB_PASSWORD=${POSTGRES_PASSWORD:-941005}
      
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_TTL=${REDIS_TTL:-1800}
      
      # 应用配置
      - FUND_DAILY_SECRET_KEY=${FUND_DAILY_SECRET_KEY}
      - FUND_DAILY_ENV=${FUND_DAILY_ENV:-production}
      - FUND_DAILY_SERVER_HOST=0.0.0.0
      - FUND_DAILY_SERVER_PORT=5000
      - FUND_DAILY_SERVER_DEBUG=${FUND_DAILY_SERVER_DEBUG:-false}
      
      # JWT 配置
      - FUND_DAILY_JWT_SECRET=${FUND_DAILY_JWT_SECRET}
      - FUND_DAILY_JWT_EXPIRE_MINUTES=${FUND_DAILY_JWT_EXPIRE_MINUTES:-30}
      - FUND_DAILY_JWT_REFRESH_DAYS=${FUND_DAILY_JWT_REFRESH_DAYS:-7}
      
      # 缓存配置
      - FUND_DAILY_CACHE_DURATION=${FUND_DAILY_CACHE_DURATION:-600}
      - FUND_DAILY_REQUEST_INTERVAL=${FUND_DAILY_REQUEST_INTERVAL:-0.5}
      
      # 安全配置
      - FUND_DAILY_SECURE_COOKIES=${FUND_DAILY_SECURE_COOKIES:-false}
      - FUND_DAILY_SSL_VERIFY=${FUND_DAILY_SSL_VERIFY:-true}
      
      # 监控配置
      - PROMETHEUS_METRICS_PORT=${PROMETHEUS_METRICS_PORT:-9090}
      
      # 日志配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=/var/log/fund-daily/app.log
      
      # 可选功能
      - ENABLE_OCR=${ENABLE_OCR:-false}
    volumes:
      - ./dist:/app/dist:ro
      - ./data:/app/data
      - fund-daily-logs:/var/log/fund-daily
    ports:
      - "${FUND_DAILY_SERVER_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - fund-daily-network

  # Nginx 反向代理 (可选，生产环境推荐)
  nginx:
    image: nginx:alpine
    container_name: fund-daily-nginx
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./dist:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - fund-daily-network

  # Prometheus 监控 (可选)
  prometheus:
    image: prom/prometheus:latest
    container_name: fund-daily-prometheus
    depends_on:
      - backend
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - fund-daily-network

  # Grafana 仪表板 (可选)
  grafana:
    image: grafana/grafana:latest
    container_name: fund-daily-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped
    networks:
      - fund-daily-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  fund-daily-logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  fund-daily-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16