# Fund Daily - Docker Compose 配置
# 版本: 2.7.7
# 使用: docker-compose up -d

services:
  # ============== 数据库 ==============
  postgres:
    image: postgres:15-alpine
    container_name: fund-daily-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-fund_daily}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============== 缓存 ==============
  redis:
    image: redis:7-alpine
    container_name: fund-daily-redis
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$REDIS_PASSWORD" ]; then
        redis-server --appendonly yes --requirepass "$REDIS_PASSWORD";
      else
        redis-server --appendonly yes;
      fi'
    env_file:
      - .env
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============== 后端 + 前端 ==============
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fund-daily-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - FUND_DAILY_DB_HOST=postgres
      - FUND_DAILY_DB_PORT=5432
      - FUND_DAILY_DB_NAME=${POSTGRES_DB:-fund_daily}
      - FUND_DAILY_DB_USER=${POSTGRES_USER:-kid}
      - FUND_DAILY_DB_PASSWORD=${POSTGRES_PASSWORD:-}
      - FUND_DAILY_REDIS_HOST=redis
      - FUND_DAILY_REDIS_PORT=6379
      - FUND_DAILY_REDIS_DB=${REDIS_DB:-0}
      - FUND_DAILY_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - FUND_DAILY_REDIS_TTL=1800
      - FUND_DAILY_CACHE_DURATION=1800
      - FUND_DAILY_SERVER_HOST=0.0.0.0
      - FUND_DAILY_SERVER_PORT=5000
    volumes:
      - ./dist:/app/dist:ro
    ports:
      - "${FUND_DAILY_SERVER_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: fund-daily-network
    driver: bridge
