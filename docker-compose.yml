version: '3.8'

services:
  # Web UI 版本
  fund-daily-web:
    image: kid941005/fund-daily:latest
    container_name: fund-daily-web
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - TZ=Asia/Shanghai
      - FLASK_ENV=production
      - FUND_DAILY_SECRET_KEY=${FUND_DAILY_SECRET_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
