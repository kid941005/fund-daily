name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      
      postgres:
        image: postgres:13-alpine
        env:
          POSTGRES_USER: kid
          POSTGRES_PASSWORD: 941005
          POSTGRES_DB: fund_daily
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock
    
    - name: Run tests
      env:
        FUND_DAILY_DB_TYPE: postgres
        FUND_DAILY_DB_HOST: localhost
        FUND_DAILY_DB_PORT: 5432
        FUND_DAILY_DB_NAME: fund_daily
        FUND_DAILY_DB_USER: kid
        FUND_DAILY_DB_PASSWORD: 941005
        FUND_DAILY_REDIS_URL: redis://localhost:6379/0
        FUND_DAILY_SECRET_KEY: test-secret-key-for-ci
        FUND_DAILY_JWT_SECRET: test-jwt-secret-key-for-ci-at-least-32-chars
      run: |
        pytest tests/ -v --cov=src --cov-report=xml \
          --ignore=tests/test_async_db.py \
          --ignore=tests/test_fund_database.py \
          --ignore=tests/test_fund_db_e2e.py \
          -k "not test_fetch_uses_cache"
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
    
    - name: Run linting
      run: |
        pip install flake8 black isort
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        black --check src/
        isort --check-only src/
  
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build frontend
      run: |
        cd web/vue3
        npm ci
        npm run build
    
    - name: Create deployment package
      run: |
        mkdir -p dist
        cp -r web/dist dist/frontend
        cp -r src dist/src
        cp -r db dist/db
        cp -r web/app.py dist/
        cp -r web/api dist/api
        cp requirements.txt dist/
        cp README.md dist/
        cp .env.example dist/.env
        
        # Create deployment script
        cat > dist/deploy.sh << 'EOF'
        #!/bin/bash
        echo "🚀 开始部署 Fund Daily..."
        
        # 检查Python版本
        python3 --version
        
        # 安装依赖
        pip3 install -r requirements.txt
        
        # 创建数据目录
        mkdir -p data
        
        # 初始化数据库
        python3 -c "from db.database import init_db; init_db()"
        
        # 启动服务
        echo "✅ 部署完成！"
        echo "启动服务: python3 web/app.py"
        EOF
        
        chmod +x dist/deploy.sh
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fund-daily-deployment
        path: dist/
  
  deploy-docs:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Generate API documentation
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -c "from src.openapi import OpenAPIGenerator; generator = OpenAPIGenerator(); generator.save_to_file('openapi.json')"
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages
        keep_files: true
        destination_dir: docs
        commit_message: "📚 更新API文档"