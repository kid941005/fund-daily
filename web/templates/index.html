<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Daily - 每日基金</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header .date {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .summary-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .summary-title {
            font-size: 16px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .summary-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            text-align: center;
        }
        
        .stat-item {
            padding: 15px;
            border-radius: 8px;
            background: #f8f9fa;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-value.up { color: #e74c3c; }
        .stat-value.down { color: #27ae60; }
        .stat-value.flat { color: #95a5a6; }
        
        .stat-label {
            font-size: 12px;
            color: #666;
        }
        
        .sentiment {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
        
        .sentiment.bullish { background: #ffeaea; color: #c0392b; }
        .sentiment.bearish { background: #eaffea; color: #27ae60; }
        .sentiment.neutral { background: #f0f0f0; color: #7f8c8d; }
        
        .fund-list {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .nav-tab {
            flex: 1;
            padding: 12px;
            background: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .nav-tab.active {
            background: #667eea;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .advisor-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .advisor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .advisor-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .advisor-badge.buy { background: #e8f5e9; color: #2e7d32; }
        .advisor-badge.hold { background: #fff3e0; color: #ef6c00; }
        .advisor-badge.sell { background: #ffebee; color: #c62828; }
        .advisor-badge.observe { background: #f5f5f5; color: #666; }
        
        .advisor-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 10px 0;
            font-size: 12px;
        }
        
        .advisor-stats div {
            text-align: center;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 6px;
        }
        
        .advisor-reasons {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-size: 12px;
        }
        
        .advisor-reasons div {
            margin: 3px 0;
        }
        
        .add-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .add-btn:hover {
            background: #5a6fd6;
        }
        
        .fund-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .fund-item:last-child {
            border-bottom: none;
        }
        
        .fund-info {
            flex: 1;
        }
        
        .fund-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .fund-code {
            font-size: 12px;
            color: #999;
        }
        
        .fund-nav {
            text-align: right;
        }
        
        .nav-value {
            font-size: 18px;
            font-weight: bold;
        }
        
        .change-value {
            font-size: 14px;
            margin-top: 5px;
        }
        
        .change-value.up { color: #e74c3c; }
        .change-value.down { color: #27ae60; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .error {
            background: #ffeaea;
            color: #c0392b;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
        }
        
        .modal-title {
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Fund Daily</h1>
        <div class="date" id="currentDate">加载中...</div>
    </div>
    
    <div class="container">
        <!-- 导航标签 -->
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('funds')">基金</button>
            <button class="nav-tab" onclick="switchTab('advisor')">建议</button>
            <button class="nav-tab" onclick="switchTab('sectors')">板块</button>
        </div>
        
        <!-- 基金列表页面 -->
        <div id="tab-funds" class="tab-content active">
        
        <div class="summary-card">
            <div class="summary-title">市场概览</div>
            <div class="summary-stats" id="summaryStats">
                <div class="loading">加载中...</div>
            </div>
            <div class="sentiment" id="marketSentiment">-</div>
        </div>
        
        <div class="fund-list">
            <div class="section-title">
                <span>我的基金</span>
                <button class="add-btn" onclick="showAddModal()">+ 添加基金</button>
            </div>
            <div id="fundList">
                <div class="loading">加载中...</div>
            </div>
        </div>
        </div>
        
        <!-- 操作建议页面 -->
        <div id="tab-advisor" class="tab-content">
            <div id="advisorList">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <!-- 热门板块页面 -->
        <div id="tab-sectors" class="tab-content">
            <div id="sectorsSummary" class="summary-card"></div>
            <div id="sectorsList">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    
    <!-- Add Fund Modal -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-title">添加基金</div>
            <div class="input-group">
                <label>基金代码</label>
                <input type="text" id="fundCode" placeholder="例如: 000001" maxlength="6">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="hideAddModal()">取消</button>
                <button class="btn btn-primary" onclick="addFund()">添加</button>
            </div>
        </div>
    </div>

    <script>
        // Update date
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN');
        
        // Load data
        async function loadData() {
            try {
                const response = await fetch('/api/funds');
                const data = await response.json();
                
                if (data.success) {
                    renderSummary(data.summary);
                    renderFundList(data.funds);
                }
            } catch (error) {
                document.getElementById('fundList').innerHTML = 
                    '<div class="error">加载失败，请刷新重试</div>';
            }
        }
        
        function renderSummary(summary) {
            const statsHtml = `
                <div class="stat-item">
                    <div class="stat-value">${summary.total}</div>
                    <div class="stat-label">总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value up">${summary.up}</div>
                    <div class="stat-label">上涨</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value down">${summary.down}</div>
                    <div class="stat-label">下跌</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value flat">${summary.flat}</div>
                    <div class="stat-label">平盘</div>
                </div>
            `;
            document.getElementById('summaryStats').innerHTML = statsHtml;
            
            const sentimentEl = document.getElementById('marketSentiment');
            sentimentEl.textContent = `市场情绪: ${summary.sentiment}`;
            sentimentEl.className = 'sentiment ' + 
                (summary.sentiment === '乐观' ? 'bullish' : 
                 summary.sentiment === '谨慎' ? 'bearish' : 'neutral');
        }
        
        function renderFundList(funds) {
            if (funds.length === 0) {
                document.getElementById('fundList').innerHTML = 
                    '<div style="text-align:center;padding:40px;color:#999">暂无基金，点击添加</div>';
                return;
            }
            
            const html = funds.map(fund => `
                <div class="fund-item">
                    <div class="fund-info">
                        <div class="fund-name">${fund.fund_name}</div>
                        <div class="fund-code">${fund.fund_code}</div>
                    </div>
                    <div class="fund-nav">
                        <div class="nav-value">${fund.nav}</div>
                        <div class="change-value ${fund.trend}">
                            ${fund.trend === 'up' ? '📈' : fund.trend === 'down' ? '📉' : '➖'} 
                            ${fund.change_percent}
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('fundList').innerHTML = html;
        }
        
        // Tab switching
        function switchTab(tabName) {
            // Update tabs
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById('tab-' + tabName).classList.add('active');
            
            // Load data if needed
            if (tabName === 'advisor') {
                loadAdvisor();
            } else if (tabName === 'sectors') {
                loadSectors();
            }
        }
        
        // Load advisor data
        async function loadAdvisor() {
            try {
                const response = await fetch('/api/advisor');
                const data = await response.json();
                
                if (data.success) {
                    renderAdvisorList(data.advisors);
                }
            } catch (error) {
                document.getElementById('advisorList').innerHTML = 
                    '<div class="error">加载失败，请刷新重试</div>';
            }
        }
        
        function renderAdvisorList(advisors) {
            if (!advisors || advisors.length === 0) {
                document.getElementById('advisorList').innerHTML = 
                    '<div style="text-align:center;padding:40px;color:#999">暂无基金，请先添加基金</div>';
                return;
            }
            
            const html = advisors.map(advisor => {
                // Badge class
                let badgeClass = 'observe';
                let badgeText = '观望';
                if (advisor.recommendation && advisor.recommendation.includes('买入')) {
                    badgeClass = 'buy';
                    badgeText = '买入';
                } else if (advisor.recommendation && advisor.recommendation.includes('卖出')) {
                    badgeClass = 'sell';
                    badgeText = '卖出';
                } else if (advisor.recommendation && advisor.recommendation.includes('持有')) {
                    badgeClass = 'hold';
                    badgeText = '持有';
                }
                
                // Reasons
                const reasonsHtml = advisor.reason ? advisor.reason.map(r => 
                    '<div>' + r + '</div>'
                ).join('') : '';
                
                return '<div class="advisor-card">' +
                    '<div class="advisor-header">' +
                    '<div><strong>' + (advisor.fund_name || '') + '</strong>' +
                    '<span style="color:#999;font-size:12px;margin-left:8px">' + (advisor.fund_code || '') + '</span></div>' +
                    '<span class="advisor-badge ' + badgeClass + '">' + badgeText + '</span></div>' +
                    '<div class="advisor-stats">' +
                    '<div><div style="color:#666">现价</div><div style="font-weight:bold">' + (advisor.current_price || '-') + '</div></div>' +
                    '<div><div style="color:#666">日涨跌</div><div style="font-weight:bold;color:' + ((advisor.daily_change || 0) >= 0 ? '#e74c3c' : '#27ae60') + '">' + ((advisor.daily_change || 0)).toFixed(2) + '%</div></div>' +
                    '<div><div style="color:#666">置信度</div><div style="font-weight:bold">' + (advisor.confidence || 0) + '%</div></div>' +
                    '</div>' +
                    '<div style="font-size:12px;color:#666">风险: ' + (advisor.risk_level || '-') + ' | 趋势: ' + (advisor.trend || '-') + ' | 波动: ' + (advisor.volatility || '-') + '%</div>' +
                    (advisor.target_price ? '<div style="font-size:12px;margin-top:5px">目标价: ' + advisor.target_price + ' | 止损: ' + advisor.stop_loss + '</div>' : '') +
                    '<div class="advisor-reasons">' + reasonsHtml + '</div>' +
                    '</div>';
            }).join('');
            
            document.getElementById('advisorList').innerHTML = html;
        }
        
        // Load sectors data
        async function loadSectors() {
            try {
                const response = await fetch('/api/sectors');
                const data = await response.json();
                
                if (data.success) {
                    renderSectors(data.data);
                }
            } catch (error) {
                document.getElementById('sectorsList').innerHTML = 
                    '<div class="error">加载失败，请刷新重试</div>';
            }
        }
        
        function renderSectors(data) {
            if (!data) return;
            
            const summary = data.summary || {};
            
            // Summary card
            const summaryHtml = '<div class="summary-title">市场概览</div>' +
                '<div class="summary-stats">' +
                '<div class="stat-item"><div class="stat-value">' + (summary.total_sectors || 0) + '</div><div class="stat-label">板块数</div></div>' +
                '<div class="stat-item"><div class="stat-value up">' + (summary.up_count || 0) + '</div><div class="stat-label">上涨</div></div>' +
                '<div class="stat-item"><div class="stat-value down">' + (summary.down_count || 0) + '</div><div class="stat-label">下跌</div></div>' +
                '<div class="stat-item"><div class="stat-value ' + ((summary.avg_change || 0) >= 0 ? 'up' : 'down') + '">' + ((summary.avg_change || 0) >= 0 ? '+' : '') + (summary.avg_change || 0) + '%</div><div class="stat-label">平均涨跌</div></div>' +
                '</div>' +
                '<div class="sentiment ' + (summary.market_sentiment === '偏多' ? 'bullish' : summary.market_sentiment === '偏空' ? 'bearish' : 'neutral') + '">' +
                '市场情绪: ' + (summary.market_sentiment || '震荡') + '</div>';
            
            document.getElementById('sectorsSummary').innerHTML = summaryHtml;
            
            // Industry sectors
            let html = '<div class="fund-list"><div class="section-title"><span>🔥 行业板块涨幅前5</span></div>';
            
            const industryHot = data.industry && data.industry.hot ? data.industry.hot : [];
            for (let i = 0; i < Math.min(5, industryHot.length); i++) {
                const s = industryHot[i];
                html += '<div class="fund-item"><div class="fund-info"><div class="fund-name">' + s.name + '</div></div>' +
                    '<div class="fund-nav"><div class="nav-value" style="color:#e74c3c">' + (s.change >= 0 ? '+' : '') + s.change.toFixed(2) + '%</div></div></div>';
            }
            html += '</div>';
            
            // Concept sectors
            html += '<div class="fund-list" style="margin-top:15px"><div class="section-title"><span>🔥 概念板块涨幅前5</span></div>';
            
            const conceptHot = data.concept && data.concept.hot ? data.concept.hot : [];
            for (let i = 0; i < Math.min(5, conceptHot.length); i++) {
                const s = conceptHot[i];
                html += '<div class="fund-item"><div class="fund-info"><div class="fund-name">' + s.name + '</div></div>' +
                    '<div class="fund-nav"><div class="nav-value" style="color:#e74c3c">' + (s.change >= 0 ? '+' : '') + s.change.toFixed(2) + '%</div></div></div>';
            }
            html += '</div>';
            
            document.getElementById('sectorsList').innerHTML = html;
        }
        
        // Modal functions
        function showAddModal() {
            document.getElementById('addModal').style.display = 'flex';
        }
        
        function hideAddModal() {
            document.getElementById('addModal').style.display = 'none';
            document.getElementById('fundCode').value = '';
        }
        
        async function addFund() {
            const code = document.getElementById('fundCode').value.trim();
            if (!code || code.length !== 6) {
                alert('请输入6位基金代码');
                return;
            }
            
            try {
                const response = await fetch('/api/add-fund', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code: code})
                });
                
                const data = await response.json();
                if (data.success) {
                    hideAddModal();
                    loadData();
                } else {
                    alert(data.error || '添加失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        }
        
        // Close modal on outside click
        document.getElementById('addModal').addEventListener('click', function(e) {
            if (e.target === this) hideAddModal();
        });
        
        // Load data on page load
        loadData();
        
        // Refresh every 60 seconds
        setInterval(loadData, 60000);
    </script>
</body>
</html>
