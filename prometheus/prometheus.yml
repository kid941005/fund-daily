# Prometheus 配置 for Fund Daily
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'fund-daily'

# 告警规则文件
rule_files:
  # - "alerts.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自身指标
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Fund Daily 应用指标
  - job_name: 'fund-daily'
    static_configs:
      - targets: ['backend:5007']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Node Exporter (系统指标)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # PostgreSQL 指标
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis 指标
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

# 远程写入配置（可选）
# remote_write:
#   - url: "http://remote-prometheus:9090/api/v1/write"

# 远程读取配置（可选）
# remote_read:
#   - url: "http://remote-prometheus:9090/api/v1/read"